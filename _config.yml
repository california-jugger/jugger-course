# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.github_repo }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Intro to Jugger
description: Course site for Introduction to Jugger
author: Reid Dye
email: contact@jugger.studentorg.berkeley.edu
baseurl: '/jugger-course/' # the subpath of your site, e.g. /blog
url: 'https://californiajugger.org' # the base hostname & protocol for your site, e.g. http://example.com

# Theme settings
remote_theme: pmarsceill/just-the-docs@v0.2.5-release
color_scheme: light
search_enabled: true
permalink: pretty
nav_links:
  Other:
    Syllabus:
      - 'https://docs.google.com/document/d/11lzTYccq9rImeHg8I0zNIRXvDTAq4JAAlEUFKjDKZrE/edit?usp=sharing'
    Discord:
      - 'https://discord.gg/JMDpU68JMv'
    Course Notes:
      - 'https://placeholder.com'
      
logo: "/assets/misc/ursae.png"
favicon_ico: "/assets/images/favicon.ico"
exclude:
  - ".#*"
  - "*~"
  - "#*#"

# Collections for website data
collections:
  - modules
  - announcements
  - staffers
# Default layouts for each collection type
defaults:
  - scope:
      path: ''
      type: modules
    values:
      layout: module
  - scope:
      path: ''
      type: announcements
    values:
      layout: announcement
  - scope:
      path: ''
      type: staffers
    values:
      layout: staffer
