---
layout: default
---
<div class="assignment-page">
  <h1 class="assignment-page-title">{{ page.title }}</h1>

  <p class="assignment-page-meta">
    {% if page.assigned %}
    <span>assigned: {{ page.assigned | date: "%b %-d, %Y" }}</span>
    {% endif %}
    {% if page.assigned and page.due %}
    <span class="assignment-page-meta-sep">·</span>
    {% endif %}
    {% if page.due %}
    <span>due: {{ page.due | date: "%b %-d, %Y" }}</span>
    {% endif %}
  </p>

  <div class="assignment-page-body">
    {{ content }}
  </div>

  <p class="assignment-page-back">
    <a href="{{ '/assignments/' | relative_url }}">← All assignments</a>
  </p>
</div>
